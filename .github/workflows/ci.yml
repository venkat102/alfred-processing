# CI for alfred_processing.
#
# Jobs: lint (ruff), mypy (type check), env_example (.env.example
# drift), test (pytest against a Redis service container), security
# (pip-audit), docker (build smoke). Runs on every push to master +
# every PR.

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install ruff
        run: pip install ruff
      - name: Ruff lint
        run: ruff check alfred/ tests/
      # Format check is deliberately NOT enforced on CI today. Pre-commit
      # hooks format staged files as they're touched, so the repo
      # normalises organically.

  # TD-L2: mypy against alfred/. Every current file is clean; CI gates
  # against regressions. Config lives in pyproject.toml under
  # [tool.mypy]. When an import genuinely needs a stub, prefer adding a
  # types-* dependency over widening the ignore.
  mypy:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: mypy
        run: mypy

  # TD-M10: adding a field to Settings without updating .env.example
  # silently ships an undocumented config knob. Script fails the build
  # on drift; BLOCKING because fixing it is one line.
  env_example:
    name: .env.example drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install app
        run: pip install -e ".[dev]"
      - name: Check .env.example covers every Settings field
        env:
          # Script imports Settings; required fields need a value to construct.
          API_SECRET_KEY: ci-placeholder-not-validated-but-32-bytes-long-pad
          ALLOWED_ORIGINS: http://example.com
        run: python scripts/check_env_example.py

  test:
    name: Pytest
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      REDIS_URL: redis://127.0.0.1:6379/0
      CI_REDIS_URL: redis://127.0.0.1:6379/2
      FALLBACK_LLM_MODEL: ""
      FALLBACK_LLM_BASE_URL: ""
      API_SECRET_KEY: ci-test-secret-key-not-a-real-secret-1234567890
      ALLOWED_ORIGINS: http://localhost:8001
      LOG_LEVEL: INFO
      DEBUG: "false"
      CREWAI_DISABLE_TELEMETRY: "true"
      CREWAI_DISABLE_TRACKING: "true"
      OTEL_SDK_DISABLED: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      # Skip the test files that need live network (Ollama, external
      # LLM, long-running pipeline state machine, benchmark suite).
      - name: Run pytest
        run: |
          pytest tests/ -q --tb=short \
            --ignore=tests/test_llm_integration.py \
            --ignore=tests/test_ollama_probe_real.py \
            --ignore=tests/test_benchmark_pipeline.py
