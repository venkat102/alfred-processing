name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-flight runs when a PR is updated — no point spending minutes
# on a stale commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Lint (informational) ────────────────────────────────────────
  # Ruff currently reports ~170 issues across the codebase (tab/space
  # legacy from pre-ruff era). This job reports them so regressions
  # are visible per-PR, but it does NOT block merge. When the number
  # reaches zero, flip `continue-on-error` to `false` and mark this
  # job required in branch protection.
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check alfred/ tests/
      - name: Ruff format check
        run: ruff format --check alfred/ tests/

  # ── .env.example drift check (blocking) ─────────────────────────
  # TD-M10: adding a field to Settings without updating .env.example
  # silently ships an undocumented config knob. Script fails the
  # build on drift; BLOCKING because fixing it is one line.
  env_example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install app (Settings import)
        run: pip install -e ".[dev]"
      - name: Check .env.example covers every Settings field
        env:
          # Script imports Settings; required fields need a value for
          # the import to succeed.
          API_SECRET_KEY: ci-placeholder-not-validated
          ALLOWED_ORIGINS: http://example.com
        run: python scripts/check_env_example.py

  # ── Test suite (blocking) ───────────────────────────────────────
  # Redis service runs on port 11000 to match the test fixture's
  # local-dev default. Tests that exercise the REST + WebSocket
  # pipeline require Redis; unit-level tests (e.g. test_rate_limit_
  # wiring, test_url_allowlist) don't need it.
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 11000:6379
        options: >-
          --health-cmd "redis-cli -p 6379 ping"
          --health-interval 5s
          --health-timeout 2s
          --health-retries 5
    env:
      API_SECRET_KEY: ci-test-secret-key-do-not-reuse
      REDIS_URL: redis://localhost:11000/0
      CI_REDIS_URL: redis://localhost:11000/2
      ALLOWED_ORIGINS: http://localhost:8001
      LOG_LEVEL: INFO
      DEBUG: "false"
      CREWAI_DISABLE_TELEMETRY: "true"
      CREWAI_DISABLE_TRACKING: "true"
      OTEL_SDK_DISABLED: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: Wait for Redis
        run: |
          for i in 1 2 3 4 5; do
            redis-cli -h localhost -p 11000 ping && break
            sleep 1
          done
      - name: Run tests with coverage
        run: >-
          pytest
          --cov=alfred
          --cov-report=term-missing:skip-covered
          --cov-report=xml
          --cov-fail-under=0
          -q
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  # ── Supply-chain / CVE scan (blocking with documented exceptions) ─
  # pip-audit reads pyproject.toml + installed packages and cross-
  # references the PyPI advisory DB. BLOCKING — new CVEs fail the
  # build and require either an upgrade or an explicit exception
  # added to the --ignore-vuln list below with a rationale.
  #
  # Current ignored CVEs (risk-accepted, NOT applicable to Alfred):
  #   CVE-2026-35029 (litellm): /config/update RCE. Alfred doesn't
  #       expose litellm's proxy endpoints — litellm is an in-process
  #       library call only.
  #   CVE-2026-35030 (litellm): /v2/login OIDC cache collision. Same
  #       reasoning — no proxy endpoints exposed.
  #   GHSA-69x8-hrgq-fjj8 (litellm): weak password hashing in litellm's
  #       own user DB. Alfred has its own auth stack (API_SECRET_KEY
  #       + JWT_SIGNING_KEY); litellm's user DB is not used.
  # Fix path: bump crewai to a version that tracks litellm >=1.83.0.
  # crewai 0.203.2 hard-pins litellm==1.74.9, so closing these CVEs
  # needs a coordinated crewai bump with full regression. See task
  # #11 in docs/tech-debt-backlog.md.
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit dependencies
        run: |
          pip-audit --desc \
            --ignore-vuln CVE-2026-35029 \
            --ignore-vuln CVE-2026-35030 \
            --ignore-vuln GHSA-69x8-hrgq-fjj8

  # ── Docker image smoke (blocking) ───────────────────────────────
  # Builds the production image to catch Dockerfile regressions.
  # Does NOT push — publish happens in a separate workflow (release.yml)
  # that's not set up yet (TD-C4 follow-up).
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: alfred-processing:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke-test image
        run: |
          docker run --rm -e API_SECRET_KEY=smoke-test \
                          -e ALLOWED_ORIGINS=http://localhost:8001 \
                          -e LOG_LEVEL=INFO \
                          alfred-processing:ci-${{ github.sha }} \
                          python -c "from alfred.main import create_app; create_app(); print('boot_ok')"
