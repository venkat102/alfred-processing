services:
  processing:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - WORKERS=${WORKERS:-4}
      - API_SECRET_KEY=${API_SECRET_KEY:-dev-secret-change-in-production}
      - REDIS_URL=redis://redis:6379/0
      - FALLBACK_LLM_MODEL=${FALLBACK_LLM_MODEL:-}
      - FALLBACK_LLM_API_KEY=${FALLBACK_LLM_API_KEY:-}
      - FALLBACK_LLM_BASE_URL=${FALLBACK_LLM_BASE_URL:-}
      - DEBUG=${DEBUG:-false}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

volumes:
  redis_data:
